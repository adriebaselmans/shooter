observations:
  - id: O1
    severity: low
    text: >
      ShadowMap.BuildLightSpace texel-snap math is approximated; the snap delta is computed
      against the original (un-snapped) view but applied via a translation. In practice the
      delta is sub-texel and visible shimmer will be minimal, but for very slow camera motion
      a per-axis fully-correct snap could be worth a follow-up. Not a blocker.
  - id: O2
    severity: low
    text: >
      ShadowMap renders only world brushes; pickups/rocket models do not cast shadows. This
      matches the design (only static brushes cast). Future work if needed.
  - id: O3
    severity: low
    text: >
      Bloom Resize() is called every frame in OnRender as well as via FramebufferResize.
      The cheap fast-path (no realloc when size matches) makes this a no-op after the first
      frame at any given size; defensive for retina + first-frame sizing edge cases.
  - id: O4
    severity: info
    text: >
      The TracerSystem remains compiled but inert (no triggers). It draws against the HDR
      buffer with normal blend, so any future tracer use will need a small HDR boost similar
      to the muzzle flash. Documented for the next-feature owner.
  - id: O5
    severity: info
    text: >
      A debug `Console.WriteLine` left in earlier in this session was already removed. No
      verbose logging in steady-state frames.

decision: passed
gate_to_dod: true
