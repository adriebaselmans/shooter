findings:
  - severity: info
    note: "Program.cs was reduced from 417 lines to 156 lines and now mainly owns window/input/bootstrap concerns."
  - severity: info
    note: "GameSession now owns gameplay/session orchestration, update flow, fire handling, and frame-data creation."
  - severity: info
    note: "FallbackSceneFactory now owns procedural fallback content instead of embedding it in Program.cs."
  - severity: info
    note: "The shader monolith was converted into a partial static class split across focused files while preserving the existing shader API used by renderers."

risks:
