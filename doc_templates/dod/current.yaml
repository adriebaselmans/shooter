summary: >
  The repository now supports authored brush material behavior through the map editor and runtime.
  Brushes can carry persisted material_properties in .shmap, the Avalonia editor exposes those
  fields in the properties panel, and Shooter.App consumes them as runtime shading controls. The
  initial authored model supports standard, water, and lava behaviors. Dust now contains a water
  demo brush for visual verification.

