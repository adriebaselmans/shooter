handoff:
  next_owner: coordinator
  pending_user_visual_verification:
    - "Run `dotnet run --project src/Shooter.App` and visually confirm AC1..AC5, AC7."
    - "If shadow acne is visible: bump shader-side bias by 0.0005 increments, or increase glPolygonOffset slope from 2.0 toward 3.0."
    - "If sky too saturated/desaturated: tune LightingEnvironment.Turbidity (2..10)."
    - "If overall image too bright/dim: tune LightingEnvironment.Exposure."

decision: approved_pending_visual_verification
