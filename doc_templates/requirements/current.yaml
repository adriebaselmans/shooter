id: req-shooter-authored-material-properties
title: Authored Material Properties via Map Editor and Shooter Runtime
status: approved
parent: req-shooter-visual-big-pass-no-editor
created_at: 2026-05-01T23:20:00Z

context: >
  The user wants material behavior authored directly in the map editor rather than relying on
  runtime-only filename conventions. The system must persist those properties in .shmap, expose
  them in the editor, and use them in Shooter.App. It must support at least standard, water, and
  lava material behaviors, and the Dust demo map should include a water example to verify the flow.

functional:
  - id: L98
    text: "The map editor exposes authored brush material properties rather than requiring runtime-only texture filename conventions."
  - id: L99
    text: "Brush material properties persist in .shmap and load/save without breaking older maps."
  - id: L100
    text: "Shooter.App consumes authored material properties as the source of truth for runtime shading behavior."
  - id: L101
    text: "The material system supports at least Standard, Water, and Lava behavior families."
  - id: L102
    text: "The Dust demo map includes a water-authored example so the new material workflow can be checked visually."

non_functional:
  - id: NL48
    text: "Remain backward-compatible with older maps that do not yet contain authored material_properties."
  - id: NL49
    text: "Keep the initial authored material model practical: brush-level properties first rather than a full per-surface authored material graph."
  - id: NL50
    text: "Build + format clean across the solution."

acceptance_criteria:
  - id: AC60
    text: "MapEditor.App.Avalonia builds with editable brush material properties in the properties panel."
  - id: AC61
    text: "Shooter.App builds and loads a .shmap using authored material properties for standard/water/lava behavior."
  - id: AC62
    text: "Dust demo map includes at least one water-authored brush and still loads cleanly."
  - id: AC63
    text: "Build + format clean."
