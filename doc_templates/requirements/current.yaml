id: req-shooter-anisotropy-and-fxaa
title: Anisotropic Filtering and FXAA in the Shooter Renderer
status: approved
created_at: 2026-05-06T20:45:00Z

context: >
  The user wants sharper textured floors/walls and a lightweight anti-aliasing option. The runtime
  should enable anisotropic texture filtering and provide an FXAA toggle in the in-game menu.

functional:
  - id: L1001
    text: "Enable anisotropic filtering for world/material textures."
  - id: L1002
    text: "Provide a lightweight FXAA anti-aliasing option in the final post process."
  - id: L1003
    text: "Expose the FXAA option in the in-game menu."

non_functional:
  - id: NL701
    text: "Keep the implementation lightweight and compatible with the existing OpenGL HDR pipeline."
  - id: NL702
    text: "Maintain existing gameplay and render feature toggles."
  - id: NL703
    text: "Build, format verification, and OpenGL smoke startup must pass."

acceptance_criteria:
  - id: AC1001
    text: "World/material textures use anisotropic filtering."
  - id: AC1002
    text: "The post process can run with FXAA enabled or disabled."
  - id: AC1003
    text: "The in-game menu exposes an FXAA toggle."
  - id: AC1004
    text: "dotnet build shooter.slnx -nologo passes."
  - id: AC1005
    text: "dotnet format shooter.slnx --verify-no-changes --severity warn -v minimal passes."
  - id: AC1006
    text: "dotnet run --project src/Shooter.App -- dust.shmap still starts successfully."
