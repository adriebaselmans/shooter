feature: poc-brush-texturing-workflow
status: ready
summary: >
  Add a professional-feeling texture assignment workflow for brush-based level
  editing so users can assign a texture to an entire brush or to individual
  brush surfaces, inspect and tweak basic surface mapping, and save/load that
  data without breaking the current fast PoC editor flow.
user_need: >
  The editor already lets the user create and edit brushes, but the next major
  usability gap is texturing. The user wants a workflow comparable to established
  3D map editors, where textures can be applied quickly to a whole brush or to
  selected faces, adjusted with simple controls, and shown clearly in the 3D
  viewport.
in_scope:
  - Assign a texture to the currently selected brush as its default texture.
  - Assign a texture to one or more selected brush surfaces.
  - Add a texture browser with previews and a current texture selection.
  - Add a surface inspector for core mapping controls: offset, scale, rotation,
    and fit/reset actions.
  - Add an in-app help entry that explains the texture-editing shortcuts and core workflow.
  - Preserve texture placement when brush transforms change through a texture-lock workflow.
  - Render textures in the 3D viewport and expose a readable editor fallback in orthographic views.
  - Persist texture assignments and mapping data in the `.shmap` format.
  - Keep all texture edits undoable and redoable through the existing command flow.
out_of_scope:
  - Full PBR material authoring or shader-graph editing.
  - Texture painting, decals, terrain splatting, or sculpt workflows.
  - Imported static-mesh material editing.
  - Advanced UV unwrapping tools beyond brush/surface mapping controls.
  - Runtime asset packaging, streaming, or compression pipelines.
functional_requirements:
  - id: FR-1
    requirement: >
      The editor shall expose a browsable texture library sourced from project-local
      image assets so the user can choose a texture visually instead of typing names manually.
  - id: FR-2
    requirement: >
      With a brush selected, the user shall be able to apply the current texture
      to the whole brush in one action.
  - id: FR-3
    requirement: >
      The editor shall support selecting one or more logical brush surfaces and
      applying the current texture only to those selected surfaces.
  - id: FR-4
    requirement: >
      For each textured surface, the editor shall support editable offset, scale,
      and rotation controls, plus a fit/reset action suitable for brush-based level editing.
  - id: FR-5
    requirement: >
      The editor shall preserve texture mapping during supported brush transform
      operations when texture lock is enabled.
  - id: FR-6
    requirement: >
      The 3D viewport shall render applied textures on brushes and shall make
      the currently selected textured surface visually obvious.
  - id: FR-7
    requirement: >
      Orthographic views shall provide a readable indication of the applied brush
      or surface texture without sacrificing editing clarity.
  - id: FR-8
    requirement: >
      Texture assignment and mapping changes shall participate in undo and redo
      through the existing scene command system.
  - id: FR-9
    requirement: >
      Saving and reopening a scene shall preserve brush default textures,
      per-surface overrides, and surface mapping values.
  - id: FR-10
    requirement: >
      The data model shall support both brush-wide default texture assignment and
      per-surface overrides without requiring raw triangle-level editing in the UI.
  - id: FR-11
    requirement: >
      The feature shall use stable logical surface identifiers for each supported
      brush primitive so saved texture data remains deterministic across sessions.
  - id: FR-12
    requirement: >
      The editor shall provide a discoverable in-app help entry that lists the
      texture-editing shortcuts and briefly explains the primary interaction flow
      for selecting faces, browsing textures, and applying or picking textures.
acceptance_criteria:
  - id: AC-1
    criterion: >
      The user can open a texture browser, pick a texture preview, and see the
      selected texture become the active texture for subsequent apply actions.
  - id: AC-2
    criterion: >
      Applying a texture to a selected brush updates the 3D viewport immediately
      and can be undone and redone.
  - id: AC-3
    criterion: >
      Applying a texture to a selected brush surface updates only that surface
      while other surfaces keep their previous texture assignment.
  - id: AC-4
    criterion: >
      Editing offset, scale, or rotation in the surface inspector changes the
      visible mapping in the 3D viewport and persists after save/reopen.
  - id: AC-5
    criterion: >
      Using fit or reset on a selected surface produces a stable, readable texture
      layout suited to brush editing.
  - id: AC-6
    criterion: >
      With texture lock enabled, moving or resizing a brush preserves surface texture
      placement according to the chosen mapping rules.
  - id: AC-7
    criterion: >
      A box brush and at least one non-box primitive can be textured, saved, reopened,
      and rendered with the same assignments and mapping values.
  - id: AC-8
    criterion: >
      Existing map files that only contain the old brush-wide `material_name`
      continue to load successfully with sensible defaults.
  - id: AC-9
    criterion: >
      A user can open a help entry from the editor UI and see the supported
      texture-editing shortcuts and their meaning without needing external documentation.
constraints:
  - Remain within the current WPF/.NET 10 PoC stack and existing project structure.
  - Reuse the current command-based scene mutation flow so undo/redo remains coherent.
  - Keep the user workflow fast and editor-first; acceptance automation and DoD remain skipped per user preference.
  - Keep the current left-handed, Y-up world convention intact.
assumptions:
  - The first delivery can treat a "texture" as a project-local image asset referenced by a stable key.
  - Logical surfaces are the user-facing editing unit, even when a primitive is internally rendered by multiple triangles.
  - Initial surface editing can focus on the 3D viewport rather than requiring full per-surface picking in orthographic views.
open_questions: []
