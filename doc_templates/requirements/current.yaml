id: req-oasis-refinery-layout-pass
title: Rework Oasis Refinery Into a Compact Deathmatch Map
status: approved
created_at: 2026-05-20T20:10:00Z

context: >
  The current Oasis Refinery map exists but plays as cumbersome and not grounded enough.
  The user wants it reshaped into a smaller, faster, more believable multiplayer arena in a
  Counter-Strike-like dusty refinery/oasis theme. The map should preserve the existing .shmap
  format and make intentional use of the engine's material behavior for water and PBR-style
  bump/roughness/metallic response.

functional:
  - id: F3001
    text: "Rebuild oasis_refinery.shmap as a compact map with readable rotations rather than a sprawling or cumbersome layout."
  - id: F3002
    text: "Provide at least two elevated combat positions, both reachable by stairs and both integrated fairly into the route network."
  - id: F3003
    text: "Keep a believable oasis/refinery setting using sand, masonry, concrete, wood, rusted machinery, and animated canal water."
  - id: F3004
    text: "Place spawns and pickups so the strongest rewards require exposure or map control rather than free spawn access."
  - id: F3005
    text: "Use material naming and material_properties in ways that activate the renderer's existing water, normal, roughness, metallic, and generated-height behavior."

non_functional:
  - id: NF3001
    text: "Keep the file fully compatible with serializer format 1.4.0 and current map loading expectations."
  - id: NF3002
    text: "Prefer a moderate brush count and simple primitives so the map stays maintainable and fast to iterate."
  - id: NF3003
    text: "Avoid introducing new texture dependencies unless the existing local CC0 texture set is insufficient."

acceptance_criteria:
  - id: AC3001
    text: "oasis_refinery.shmap remains valid JSON and preserves the expected top-level map structure."
  - id: AC3002
    text: "The final layout clearly contains a central canal mid, west and east side routes, and two stair-access elevated platforms."
  - id: AC3003
    text: "Metal gameplay surfaces use the shipped metal_panel_1k and metal_rust_1k materials so companion PBR maps can drive richer surface relief."
  - id: AC3004
    text: "Water uses kind: water material behavior with animated/reflection-oriented properties rather than behaving like a standard opaque surface."
