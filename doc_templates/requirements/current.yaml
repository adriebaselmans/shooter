feature: avalonia-production-texture-browser-and-close-stability
status: ready
summary: >
  Stabilize Avalonia editor shutdown and replace the temporary texture strip with
  a production-style material browser that supports static and animated editor
  materials, including first-class animated water and lava.
user_need: >
  Closing the app must not crash. Texture selection/configuration should feel
  like a serious level editor workflow, closer to Hammer or SketchUp than a raw
  file list, and water/lava animated materials must be implemented properly.
in_scope:
  - Fix Avalonia close/shutdown so render handlers and GL-backed resources do not crash during app exit.
  - Avoid blocking async confirmation dialogs on the Avalonia UI thread during close.
  - Redesign texture UX as a material browser with collections, search, filters, tiles, and a selected-material inspector.
  - Preserve brush-wide and selected-face material application commands.
  - Add material metadata: category, kind, average color, usage hint, and animation metadata.
  - Add built-in animated water and lava materials even when no source PNG assets exist.
  - Render water and lava with time-based shader animation in the perspective viewport.
out_of_scope:
  - Writing automated tests, per user instruction.
  - A full material-authoring pipeline with imported animation frame sheets.
  - Runtime game-engine material simulation beyond editor viewport preview.
  - Downloaded online texture packs.
functional_requirements:
  - id: FR-1
    requirement: Closing the Avalonia editor shall not crash because of synchronous dialog blocking or GL resource teardown.
  - id: FR-2
    requirement: The texture browser shall expose searchable material tiles with collection and type filters.
  - id: FR-3
    requirement: The selected material shall show preview, category, material kind, color, animation state, and usage guidance.
  - id: FR-4
    requirement: The user shall be able to filter to animated materials and quickly access water/lava.
  - id: FR-5
    requirement: Water and lava shall exist as selectable materials even before dedicated art files are added.
  - id: FR-6
    requirement: Applying the selected material to a brush or selected faces shall use the existing undoable scene-command path.
  - id: FR-7
    requirement: Animated water and lava shall visibly animate in the perspective OpenGL viewport.
acceptance_criteria:
  - id: AC-1
    criterion: dotnet build shooter.slnx succeeds after the changes.
  - id: AC-2
    criterion: The Avalonia app starts from the repository root without immediate exceptions.
  - id: AC-3
    criterion: Closing uses an async close-confirmation path and does not synchronously block the UI thread.
  - id: AC-4
    criterion: The material browser shows collections, search, material type filter, animated-only filter, tiles, and an inspector.
  - id: AC-5
    criterion: Built-in animated water and lava entries appear in the browser and can be selected/applied like normal textures.
  - id: AC-6
    criterion: Renderers receive material animation metadata through the texture catalog contract.
  - id: AC-7
    criterion: Water and lava render with shader-driven flow/pulse animation in perspective view.
constraints:
  - Stay native Avalonia for the editor UI.
  - Do not reintroduce WPF dependencies into the active Avalonia app.
  - Do not write tests.
  - Preserve existing texture application commands and map format behavior.
open_questions: []
