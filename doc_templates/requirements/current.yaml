id: req-shooter-opengl-polish-three-pass
title: OpenGL Runtime Polish in Three Unattended Passes
status: approved
created_at: 2026-05-06T13:30:00Z

context: >
  Metal has been removed. The user wants the stable OpenGL path polished further, unattended,
  in three passes: Dust/map polish, material+water polish, and combat-feel polish.

functional:
  - id: L401
    text: "Pass 1 improves Dust route readability and reward distribution without destabilizing the current map/runtime."
  - id: L402
    text: "Pass 2 improves authored material response, especially water, on the OpenGL path."
  - id: L403
    text: "Pass 3 improves combat feel through gameplay/HUD/render feedback on the OpenGL path."

non_functional:
  - id: NL201
    text: "Prefer incremental, low-risk polish over renderer rewrites."
  - id: NL202
    text: "Do not reintroduce Metal or backend-selection complexity."
  - id: NL203
    text: "Build, format verification, and OpenGL smoke startup must pass after the three passes."

acceptance_criteria:
  - id: AC401
    text: "Dust contains a tangible readability/reward polish pass (e.g. route landmarks, cover, or pickup rebalancing)."
  - id: AC402
    text: "Water/material behavior is visibly richer in the OpenGL world shading path while staying authored-property driven."
  - id: AC403
    text: "Combat feedback is tangibly improved through gameplay, HUD, particle, tracer, or weapon-feel changes."
  - id: AC404
    text: "`dotnet build shooter.slnx -nologo` passes."
  - id: AC405
    text: "`dotnet format shooter.slnx --verify-no-changes --severity warn -v minimal` passes."
  - id: AC406
    text: "`dotnet run --project src/Shooter.App -- dust.shmap` still starts successfully."
