id: req-shooter-remove-metal-backend
title: Remove Metal Backend from Shooter.App
status: approved
created_at: 2026-05-06T12:55:00Z

context: >
  The user explicitly wants the Metal renderer removed and is done with maintaining or evaluating
  the Metal path. Shooter.App should return to a clean OpenGL-only runtime state.

functional:
  - id: L301
    text: "Remove the Metal backend implementation and Metal platform interop code from Shooter.App."
  - id: L302
    text: "Remove Metal runtime selection/startup logic so Shooter.App runs through the OpenGL path only."
  - id: L303
    text: "Keep the working OpenGL renderer behavior intact."

non_functional:
  - id: NL151
    text: "Prefer a straightforward deletion/simplification pass over partial Metal deprecation."
  - id: NL152
    text: "Do not regress the current OpenGL gameplay/rendering path."
  - id: NL153
    text: "Build and format verification must pass after removal."

acceptance_criteria:
  - id: AC301
    text: "`MetalBootstrapBackend.cs` and Metal Objective-C interop support are removed from the Shooter.App runtime codebase."
  - id: AC302
    text: "Program startup no longer selects or initializes a Metal backend."
  - id: AC303
    text: "Shooter.App still builds and starts successfully on `dust.shmap` using OpenGL."
  - id: AC304
    text: "`dotnet build shooter.slnx -nologo` passes."
  - id: AC305
    text: "`dotnet format shooter.slnx --verify-no-changes --severity warn -v minimal` passes."
