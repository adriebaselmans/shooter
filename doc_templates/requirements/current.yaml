id: req-shooter-three-worker-refactor-batch
title: Three-Worker Refactor Batch
status: approved
created_at: 2026-05-06T17:05:00Z

context: >
  The user asked to continue the refactor "for all, in 3 parallel workers". The next highest-value
  independent workstreams are renderer-resource decomposition, world-factory decomposition, and
  Program/input bootstrap cleanup.

functional:
  - id: L551
    text: "Split OpenGLRenderResources into smaller collaborators with explicit scene, lighting, and post-processing ownership boundaries."
  - id: L552
    text: "Split GameWorldFactory into smaller collaborators with explicit brush-building and scene-metadata extraction responsibilities."
  - id: L553
    text: "Extract Program input/bootstrap helper logic into a dedicated collaborator so Program.cs sheds more event-binding detail."

non_functional:
  - id: NL301
    text: "Treat the three workstreams as structurally independent refactors with no intended runtime behavior change."
  - id: NL302
    text: "Prefer cohesive collaborators and deletion of duplicated glue over larger monolithic replacements."
  - id: NL303
    text: "Build, format verification, and OpenGL smoke startup must pass."

acceptance_criteria:
  - id: AC551
    text: "OpenGLRenderResources no longer directly owns all scene, lighting, and post-processing members in one flat class."
  - id: AC552
    text: "GameWorldFactory no longer directly owns both brush-building and scene metadata extraction details."
  - id: AC553
    text: "Program.cs no longer directly owns the low-level input event binding and mouse-delta bookkeeping logic."
  - id: AC554
    text: "dotnet build shooter.slnx -nologo passes."
  - id: AC555
    text: "dotnet format shooter.slnx --verify-no-changes --severity warn -v minimal passes."
  - id: AC556
    text: "dotnet run --project src/Shooter.App -- dust.shmap still starts successfully."
