id: req-shooter-dust-final-polish
title: Shooter.App Dust Map — Final Cleanup, Balance, and Visual Polish
status: approved
parent: req-shooter-dust-polish
created_at: 2026-04-29T22:10:00Z

context: >
  The core floor/wall disconnection issue is now fixed at the engine level: box top/bottom face
  winding in MeshGenerator was wrong. With the root cause removed, the user wants a proper final
  polish pass: simplify temporary debugging or workaround changes that are no longer needed,
  rebalance route pickups a bit, and make the Dust-inspired map cleaner and more attractive.

functional:
  - id: L46
    text: "Remove temporary debugging/runtime instrumentation added only for seam diagnosis when it is no longer needed for the shipped map experience."
  - id: L47
    text: "Simplify map hacks that were introduced while chasing the old seam bug if they are no longer necessary after the MeshGenerator fix."
  - id: L48
    text: "dust.shmap receives a final visual polish pass that improves route landmarking, facade variety, and overall Dust-like readability without regressing the fixed geometry connections."
  - id: L49
    text: "Pickups are rebalanced so each major route offers a meaningful incentive while the strongest rewards remain contestable rather than stacked in one area."
  - id: L50
    text: "The final polished map still preserves the three-route identity: long/open lane, mid route, tunnel/interior route."

non_functional:
  - id: NL17
    text: "No new package references. Prefer content cleanup and small code cleanup only."
  - id: NL18
    text: "Any code cleanup must preserve the now-correct box mesh winding behavior and must not reintroduce floor/wall seam artifacts."
  - id: NL19
    text: "Build + format clean and smoke-run clean on dust.shmap."

acceptance_criteria:
  - id: AC26
    text: "`dotnet run --project src/Shooter.App -- dust.shmap` loads the final polished map successfully with the floor/wall connection issue still fixed."
  - id: AC27
    text: "Temporary seam-debug controls or toggles are removed unless they remain intentionally supported as a permanent debug feature with clear justification."
  - id: AC28
    text: "The map looks cleaner and more deliberate than the bug-hunt version: no obvious patch geometry, clearer landmarks, and improved pickup distribution."
  - id: AC29
    text: "Build + format clean."

out_of_scope:
  - "A completely new map layout from scratch."
  - "Advanced scripted objectives, bots, or game-mode-specific logic."
  - "PBR/normal-map work for brush geometry."
