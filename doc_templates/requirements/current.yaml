id: req-shooter-clean-code-refactor-pass
title: Clean Code Refactor Pass for Shooter.App
status: approved
created_at: 2026-05-06T14:20:00Z

context: >
  The user requested a serious clean-code refactor in the OpenGL-only codebase. The largest
  current debts are oversized application orchestration in Program.cs, fallback scene creation
  mixed into startup code, and the monolithic shader source file.

functional:
  - id: L501
    text: "Refactor runtime orchestration so Program.cs is no longer responsible for most gameplay/session update logic."
  - id: L502
    text: "Extract fallback scene creation into a dedicated component instead of keeping it embedded in Program.cs."
  - id: L503
    text: "Split the monolithic shader source definition into focused files while preserving shader behavior."

non_functional:
  - id: NL251
    text: "Preserve current OpenGL runtime behavior during the refactor."
  - id: NL252
    text: "Prefer cohesion, small responsibilities, and readable ownership boundaries over broad architectural reinvention."
  - id: NL253
    text: "Build, format verification, and OpenGL smoke startup must pass after the refactor."

acceptance_criteria:
  - id: AC501
    text: "Program.cs becomes substantially smaller and primarily handles window/input/bootstrap responsibilities."
  - id: AC502
    text: "Gameplay/session update responsibilities are owned by a dedicated runtime class."
  - id: AC503
    text: "Fallback scene generation is owned by a dedicated file/class."
  - id: AC504
    text: "Shader source definitions are split across multiple focused files instead of a single giant file."
  - id: AC505
    text: "dotnet build shooter.slnx -nologo passes."
  - id: AC506
    text: "dotnet format shooter.slnx --verify-no-changes --severity warn -v minimal passes."
  - id: AC507
    text: "dotnet run --project src/Shooter.App -- dust.shmap still starts successfully."
