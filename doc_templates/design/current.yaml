id: design-shooter-opengl-polish-three-pass
title: Design — OpenGL Runtime Polish in Three Unattended Passes
status: approved
parent: req-shooter-opengl-polish-three-pass
created_at: 2026-05-06T13:32:00Z

decisions:
  Q1_pass1_map:
    decision: "Use a focused Dust content pass: add a small number of route-defining props/cover elements and rebalance pickups rather than redesigning the whole arena."
    rationale: "This gives immediate readability and reward improvements with low risk."
  Q2_pass2_materials:
    decision: "Keep the existing authored material pipeline and deepen the OpenGL world shader plus presets/fallback heuristics, with water as the primary beneficiary."
    rationale: "The authored property system already exists and should remain the source of truth."
  Q3_pass3_combat:
    decision: "Improve combat feel via lightweight gameplay/render feedback: hitscan tracers, impact dust, weapon-sensitive muzzle smoke, and a more reactive HUD/crosshair."
    rationale: "These changes improve feel significantly without requiring enemies or a broader combat-system rewrite."

implementation_plan:
  - "Pass 1: update `dust.shmap` with a small set of new landmark/cover brushes and pickup redistribution."
  - "Pass 2: tune `BrushMaterialProperties`, `GameWorld` surface heuristics, and `Shaders.WorldFrag` water/lava/standard response."
  - "Pass 3: extend weapon fire results for tracer endpoints, add impact/muzzle particle feedback, and upgrade HUD responsiveness."
  - "Validate with build, format verification, and OpenGL smoke startup on `dust.shmap`."
