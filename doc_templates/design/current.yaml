id: design-shooter-anisotropy-and-fxaa
title: Design — Anisotropic Filtering and FXAA
status: approved
parent: req-shooter-anisotropy-and-fxaa
created_at: 2026-05-06T20:47:00Z

decisions:
  Q1_texture_filtering:
    decision: "Set world/material textures to anisotropic filtering at upload time."
    rationale: "This improves floor/wall clarity at shallow viewing angles."
  Q2_aa_technique:
    decision: "Use FXAA in the existing tone-map pass."
    rationale: "FXAA is lightweight, easy to toggle, and fits the current single-pass post-processing design."
  Q3_menu:
    decision: "Expose FXAA as a live in-game menu toggle alongside the other render features."
    rationale: "This keeps tuning ergonomic without adding a new UI layer."

implementation_plan:
  - "Apply anisotropic filtering in TextureCache after each texture upload."
  - "Add FXAA enable state to LightingEnvironment and wire it through the post process."
  - "Extend the tone-map shader with a simple FXAA resolve."
  - "Add an FXAA item to the in-game menu."
  - "Validate with build, format verification, and OpenGL smoke startup."
