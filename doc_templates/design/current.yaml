phase: architecture
status: in-progress
system: Shooter.App
components:
  - TAA
  - HdrTarget
  - Shaders
design:
  - Add Temporal Anti-Aliasing (TAA) to replace/augment FXAA.
  - 1. Jittered Projection: Apply Halton sequence subpixel jitter to the projection matrix.
  - 2. Velocity Buffer: Add an RG16F render target to HdrTarget (location 2).
  - 3. Motion Vectors: Pass `uPrevViewProj` and `uPrevModel` to shaders. Output `(ndc - prevNdc) * 0.5` as velocity.
  - 4. History Buffer: Ping-pong RGBA16F textures storing the resolved frame.
  - 5. Resolve Pass: Reproject history using velocity, apply neighborhood clamping (AABB) to prevent ghosting, and blend.
