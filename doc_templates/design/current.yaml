id: design-shooter-clean-code-refactor-pass
title: Design — Clean Code Refactor Pass for Shooter.App
status: approved
parent: req-shooter-clean-code-refactor-pass
created_at: 2026-05-06T14:22:00Z

decisions:
  Q1_runtime_orchestration:
    decision: "Introduce a dedicated GameSession class that owns loaded world state, gameplay systems, update flow, fire handling, and frame-data creation."
    rationale: "Program.cs should coordinate the host application, not directly run most gameplay logic."
  Q2_fallback_scene:
    decision: "Extract procedural fallback-map construction into a FallbackSceneFactory."
    rationale: "Fallback content generation is useful but is unrelated to app/window bootstrap responsibilities."
  Q3_shader_structure:
    decision: "Convert the shader container to a partial static class and split shader definitions by concern (world, sky, overlays, postfx)."
    rationale: "This preserves the current API surface while dramatically improving maintainability."

implementation_plan:
  - "Add GameSession to own runtime state and frame/update orchestration."
  - "Reduce Program.cs to argument parsing, window/input setup, backend bootstrap, and delegation to GameSession."
  - "Add FallbackSceneFactory and move procedural scene creation there."
  - "Rewrite Shaders.cs into a small shared/core file and add focused partial shader files."
  - "Validate via build, format verification, and OpenGL smoke startup on dust.shmap."
