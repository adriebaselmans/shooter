phase: architecture
status: approved
system: Shooter.App (Map Assets)
components:
  - MapSerializer
  - Shooter.App.TextureCache
  - Shooter.App.MaterialMapConventions
  - WorldGeometry

design:
  - "Use a compact 76x76 courtyard footprint to reduce dead travel time and keep engagements immediate."
  - "Anchor the layout with a narrow central canal running north-south, then create safe crossings at two short bridges to support fast mid fights."
  - "Build three readable combat routes: a west pump-house lane, a risky center canal lane, and an east loading-bay lane."
  - "Create two mirrored elevated positions: a west service platform and an east loading platform, each reached by four simple stair brushes rather than jumps."
  - "Break long spawn-to-mid sightlines with plaster spawn walls, kiosks, lane cover, and small wood/concrete props."
  - "Keep the world grounded in a Dust-like refinery/oasis look using sand, brick, plaster, concrete, wood, rusted metal, blue awnings, and authored canal water."
  - "Use textures/dust/metal_panel_1k.jpg and textures/dust/metal_rust_1k.jpg on key industrial surfaces so the renderer can automatically resolve _normal, _roughness, _metallic, and _height companions."
  - "Tune material_properties explicitly: low-roughness/high-metallic values for catwalk metal, rougher values for corroded machinery, and water kind properties for animated reflections/refraction."
  - "Keep pickups exposed on bridges, platforms, and lane edges so stronger resources reinforce movement and map control."

parallel_plan:
  preconditions:
    - "Existing local CC0 texture set under assets/textures/dust/ is sufficient; no new downloads are required."
  workstreams:
    - id: WS1
      owner: Developer
      scope:
        - "Rewrite oasis_refinery.shmap with the new lane structure, stairs, cover, lights, spawns, and pickups."
      outputs:
        - "oasis_refinery.shmap"
      dependencies: []
      can_run_in_parallel_with: []
  merge_order:
    - "Validate JSON structure and perform a cheap .NET map-format confidence check after implementation."
