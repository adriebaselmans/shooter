id: design-shooter-remove-metal-backend
title: Design — Remove Metal Backend from Shooter.App
status: approved
parent: req-shooter-remove-metal-backend
created_at: 2026-05-06T12:57:00Z

decisions:
  Q1_scope:
    decision: "Remove Metal code completely rather than leaving a stub or unsupported backend option."
    rationale: "The user asked to remove all Metal-related runtime code, not just disable it."
  Q2_runtime_shape:
    decision: "Keep the lightweight render-backend abstraction only if it remains trivial for the surviving OpenGL path."
    rationale: "This minimizes code churn while still removing Metal-specific complexity."
  Q3_startup:
    decision: "Simplify program startup to always request the existing OpenGL 3.3 context and instantiate the OpenGL backend directly."
    rationale: "Once Metal is gone, backend-selection logic becomes unnecessary runtime complexity."

implementation_plan:
  - "Delete `src/Shooter.App/RenderSystem/MetalBootstrapBackend.cs`."
  - "Delete `src/Shooter.App/Platform/Metal/ObjCRuntime.cs`."
  - "Simplify `Program.cs` to OpenGL-only startup."
  - "Remove now-unused backend-selection/Metal-only support files or members if they become dead after the simplification."
  - "Validate with build, format verification, and OpenGL smoke startup on `dust.shmap`."
