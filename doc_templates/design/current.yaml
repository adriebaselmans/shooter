feature: avalonia-production-texture-browser-and-close-stability
status: approved
summary: >
  Make texture/material handling a small metadata-driven editor subsystem and
  route shutdown through Avalonia-safe async close confirmation plus GL-context
  deinitialization cleanup.
affected_modules:
  - src/MapEditor.App.Avalonia/MainWindow.axaml
  - src/MapEditor.App.Avalonia/MainWindow.axaml.cs
  - src/MapEditor.App.Avalonia/Views/AvaloniaGlViewportHost.cs
  - src/MapEditor.App.Avalonia/Views/ViewportPanel.axaml.cs
  - src/MapEditor.App/ViewModels/MainViewModel.cs
  - src/MapEditor.App/Services/TextureLibraryService.cs
  - src/MapEditor.Rendering/Infrastructure/TextureCatalogContracts.cs
  - src/MapEditor.Rendering/Infrastructure/TextureGpuCache.cs
  - src/MapEditor.Rendering/Renderers/PerspectiveViewportRenderer.cs
  - src/MapEditor.Rendering/Shaders/brush_solid.frag.glsl
design:
  close_stability:
    - MainWindow.OnClosing cancels the first close request and awaits MainViewModel.RequestCloseAsync.
    - Reentrant close is guarded by _closeConfirmed and _closeConfirmationPending.
    - Viewport render handlers are detached when the panel leaves the visual tree.
    - GL-backed renderer resources are disposed from AvaloniaGlViewportHost.OpenGlDeinitializing.
  texture_ux:
    - Bottom browser becomes a material library with collection list, search, type filter, animated toggle, material tiles, and inspector.
    - Right properties panel shows selected material context and keeps Apply Brush / Apply Faces close to surface mapping controls.
    - Animated filter is also available through a direct command from the texture panel.
  material_model:
    - TextureAssetDescriptor carries TextureMaterialKind and optional TextureAnimationDescriptor.
    - TextureLibraryEntry mirrors metadata for the UI: category, kind label, animation label, usage hint, and average color.
    - Catalog injects built-in procedural liquids/water_animated and hazards/lava_animated materials.
  rendering:
    - TextureGpuCache generates deterministic procedural 64x64 textures for built-in water/lava descriptors.
    - Perspective renderer passes elapsed time, animation kind, flow speed, and pulse strength to the solid shader.
    - Fragment shader scrolls/waves water UVs and pulses lava color.
validation_plan:
  - Build active solution.
  - Launch Avalonia app from repository root and check for immediate exceptions.
  - Manual follow-up: apply water/lava to brush/surfaces and close the window from the UI.
risks:
  - Manual UI close cannot be fully exercised by terminal-only tooling.
  - Built-in water/lava are procedural placeholders until dedicated art assets or spritesheets are supplied.
non_goals:
  - Automated regression tests.
  - Full texture import/authoring UI.
  - Bundled online texture packs.
