id: design-shooter-authored-material-properties
title: Design — Authored Material Properties Through Editor and Runtime
status: approved
parent: req-shooter-authored-material-properties
created_at: 2026-05-01T23:25:00Z

decisions:
  Q1_authoring_scope:
    decision: "Implement brush-level authored material properties first, while leaving existing per-surface texture mapping intact."
    rationale: "Delivers editor-driven material behavior with much lower complexity than a full per-surface authored material graph."
  Q2_property_list:
    decision: "Use one practical property set shared across Standard/Water/Lava: kind, roughness, specular strength, normal strength, emissive strength, opacity, flow speed, distortion strength, fresnel strength, and pulse strength."
    rationale: "Covers the most useful stylized/runtime behaviors without inventing a full material node system."
  Q3_persistence:
    decision: "Persist properties as an optional `material_properties` object on each brush in .shmap (format 1.4.0), but continue loading maps that omit it."
    rationale: "Backward-compatible and explicit."
  Q4_runtime_use:
    decision: "Shooter runtime treats authored material properties as the preferred source of shading behavior, falling back to legacy heuristics only when a brush still has default standard properties."
    rationale: "Preserves old maps while moving new content to authored control."
  Q5_demo_validation:
    decision: "Add one water-authored demo brush to dust.shmap."
    rationale: "Provides an immediate visual verification path."

implementation_plan:
  - "Add BrushMaterialKind + BrushMaterialProperties in MapEditor.Core."
  - "Add editable fields to the editor properties panel and a command to commit brush material changes."
  - "Add material_properties DTO/serializer support."
  - "Update Shooter world extraction to read authored properties and feed them into shader/material bindings."
  - "Implement Standard/Water/Lava behavior in runtime shaders and add one water brush to Dust."

risks_and_mitigations:
  R1_scope_growth:
    mitigation: "Stop at brush-level properties for this phase."
  R2_old-map behavior:
    mitigation: "Fallback to existing inferred visuals when authored properties are absent/default."
  R3_backend drift:
    mitigation: "Mirror the authored property usage into both OpenGL and Metal paths where practical."
