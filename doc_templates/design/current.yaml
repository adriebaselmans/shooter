id: design-shooter-dust-final-polish
title: Design — Shooter.App Dust Final Cleanup, Balance, and Visual Polish
status: approved
parent: req-shooter-dust-final-polish
created_at: 2026-04-29T22:15:00Z

decisions:
  Q1_cleanup_scope:
    decision: "Remove temporary seam-investigation controls (F2/F3 shadow/SSAO toggles and related runtime fields) now that the true root cause is fixed."
    rationale: "These toggles were diagnostic only. They add clutter to the shipped runtime and are no longer needed once mesh winding is corrected."
  Q2_map_normalization:
    decision: "Normalize floor-contact geometry back toward clean authored contact, keeping only minimal overlap where visually justified."
    rationale: "The previous map accumulated workaround tweaks while the root cause was unknown. After the engine fix, those hacks should be reduced."
  Q3_visual_polish:
    decision: "Do a restrained beauty pass: stronger route landmarking, facade variation using existing textures, and cleaner Dust-like composition without another large geometry explosion."
    rationale: "The user asked for polish, not another debugging detour."
  Q4_pickup_balance:
    decision: "Spread incentives across T approach, mid contest, A-long, and B-market so no single route hoards all the value."
    rationale: "Improves free-roam combat flow and route choice."

implementation_plan:
  code_cleanup:
    - "Remove InputKey.F2/F3 and corresponding Program.cs debug toggle plumbing."
    - "Remove LightingEnvironment.ShadowsEnabled if no longer needed after cleanup."
    - "Restore normal shadow/AO pass behavior in Program.cs and WorldRenderer."
  map_cleanup:
    - "Recompute floor-contact brush centers to exact contact instead of the temporary -0.08 sink used during seam debugging."
    - "Keep the now-useful structural supports (awning posts, lintel connections) because those fixed real disconnected architecture."
    - "Leave the slightly larger floor if it improves robustness and does not read badly."
  visual_pass:
    - "Use existing imported textures for more facade variety (brick vs plaster vs stone) on selected walls."
    - "Add/adjust a few landmark elements only where they clarify routes: facade bands, market stall fronts, and route-entry accents."
  pickup_pass:
    - "Make mid the shotgun contest route, B the rocket risk/reward route, and A-long the sustained-rifle lane with health spacing."

risks_and_mitigations:
  R1_reintroducing_seam_bug:
    mitigation: "Do not touch the fixed box top/bottom winding; validate with smoke run on dust.shmap."
  R2_overcleaning_map_contacts:
    mitigation: "Normalize only floor-contact Y values; keep support posts and corrected lintels."
  R3_visual regression:
    mitigation: "Prefer small material/placement improvements over large geometry churn."
