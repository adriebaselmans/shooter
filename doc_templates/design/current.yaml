id: design-shooter-three-worker-refactor-batch
title: Design — Three-Worker Refactor Batch
status: approved
parent: req-shooter-three-worker-refactor-batch
created_at: 2026-05-06T17:07:00Z

decisions:
  Q1_renderer_resources:
    decision: "Introduce focused OpenGL resource-group collaborators for scene renderers, lighting resources, and post-processing resources, then compose them from OpenGLRenderResources."
    rationale: "This reduces the remaining flat resource-owner surface while preserving current renderer call sites through composition."
  Q2_world_factory:
    decision: "Introduce WorldBrushFactory and SceneWorldMetadataExtractor, then reduce GameWorldFactory to orchestration."
    rationale: "Brush conversion and scene metadata extraction are distinct concerns."
  Q3_program_input:
    decision: "Introduce GameInputBinder to own low-level Silk input event hookup and mouse delta accumulation for InputState."
    rationale: "Program should coordinate app lifecycle, not contain raw input binding mechanics."

implementation_plan:
  - "Worker 1: add OpenGLSceneResources, OpenGLLightingResources, and OpenGLPostProcessResources; refactor OpenGLRenderResources/OpenGLFrameRenderer to use them."
  - "Worker 2: add WorldBrushFactory and SceneWorldMetadataExtractor; refactor GameWorldFactory to orchestrate them."
  - "Worker 3: add GameInputBinder and simplify Program.cs accordingly."
  - "Validate the combined batch with build, format verification, and OpenGL smoke startup."
