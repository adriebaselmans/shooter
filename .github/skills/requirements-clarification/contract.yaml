name: requirements-clarification
description: Turn a user need into an implementation-ready requirement baseline with minimal but sufficient clarification.
response_mode: one-shot
required_inputs:
  - user need from the coordinator
  - doc_templates/requirements/current.yaml
  - relevant project memory in .ai-team/framework/memory/
expected_outputs:
  - doc_templates/requirements/current.yaml
  - clarification questions for the coordinator when needed
owned_artifacts:
  - doc_templates/requirements/current.yaml
completion_criteria:
  - Scope, acceptance criteria, constraints, and assumptions are explicit.
  - Definition of Ready is ready or blocking questions are returned.
